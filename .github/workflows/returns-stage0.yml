name: Monthly Returns — Stage 0 Signals

# MANUAL TRIGGER ONLY — run this on the last trading day of each month.
# Calculates tactical portfolio signals using that day's closing prices
# and stores the resulting holdings in tactical_monthly_holdings.
# Stage 1 on the 3rd of next month picks these holdings up automatically.

on:
  workflow_dispatch:
    inputs:
      month:
        description: 'Month holdings are IN EFFECT (YYYY-MM, e.g. 2026-06 if run at end of May). Leave blank to auto-detect.'
        required: false
        default: ''

jobs:
  signals:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/auto-returns/requirements.txt

      - name: Run Stage 0
        working-directory: scripts/auto-returns
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            python stage0_signals.py --month ${{ github.event.inputs.month }}
          else
            python stage0_signals.py
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
